# Sample config using XPath and an attribute + regex extraction.
ipeds_unit_id: 100002
name: Example Tech Institute
url: https://www.example-tech.edu/cost/tuition
academic_year: 2025
respect_robots: true
tuition_in_state:
  type: xpath
  expr: "//tr[td[contains(., 'In-State')]]/td[@class='cost']/text()"
  regex: "([0-9,]+(?:\\.[0-9]{2})?)"
tuition_out_of_state:
  type: xpath
  expr: "//tr[td[contains(., 'Out-of-State')]]/td[@class='cost']/text()"
  regex: "([0-9,]+(?:\\.[0-9]{2})?)"
